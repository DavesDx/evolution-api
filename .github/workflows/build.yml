name: Compilar para cPanel
on: [workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código Oficial
        run: |
          # Clonamos el código directamente desde el origen
          git clone https://github.com/EvolutionAPI/evolution-api.git .
          echo "Código descargado correctamente."

      - name: 2. Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. Instalar Dependencias
        run: npm install

      - name: 4. Generar Base de Datos (Prisma)
        run: npx prisma generate

      - name: 5. Compilar Proyecto
        run: npm run build

      - name: 6. Empaquetar para cPanel
        run: |
          # Creamos el ZIP con lo necesario para que funcione en tu hosting
          zip -r dist.zip dist package.json package-lock.json prisma
          echo "Archivo comprimido listo."

      - name: 7. Subir Archivo Final
        uses: actions/upload-artifact@v4
        with:
          name: evolucion-api-listo
          path: dist.zip
