name: Compilar para cPanel
on: [workflow_dispatch]

env:
  # Forzamos herramientas modernas para este 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código Oficial (Método Directo)
        uses: actions/checkout@v4
        with:
          repository: EvolutionAPI/evolution-api # Trae el código original directamente

      - name: 2. Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. Instalar Dependencias
        run: npm install

      - name: 4. Generar Prisma y Compilar
        run: |
          # Intentamos encontrar el schema en las rutas más comunes
          if [ -f "./prisma/schema.prisma" ]; then
            npx prisma generate --schema=./prisma/schema.prisma
          else
            # Si no está en la raíz, lo buscamos agresivamente
            SCHEMA_PATH=$(find . -name "schema.prisma" | head -n 1)
            npx prisma generate --schema=$SCHEMA_PATH
          fi
          
          # Compilamos el código TypeScript a JavaScript
          npm run build

      - name: 5. Crear Paquete para cPanel
        run: |
          # Solo metemos en el ZIP lo que cPanel necesita para correr
          zip -r dist.zip dist package.json package-lock.json prisma
          echo "¡Paquete listo para descargar!"

      - name: 6. Entregar Archivo
        uses: actions/upload-artifact@v4
        with:
          name: evolucion-api-listo
          path: dist.zip
