name: Compilar para cPanel
on: [workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Limpiar y Descargar Código Real
        run: |
          # Forzamos la descarga del código oficial en la carpeta actual
          git clone https://github.com/EvolutionAPI/evolution-api.git .
          ls -R prisma/ # Esto nos dirá si el archivo existe
          
      - name: 2. Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. Instalar Dependencias
        run: |
          npm install
          # Instalamos Prisma globalmente por si acaso
          npm install -g prisma 

      - name: 4. Generar Base de Datos (Prisma)
        run: |
          # Buscamos el archivo y lo usamos directamente
          SCHEMA_PATH=$(find . -name "schema.prisma")
          echo "Usando schema en: $SCHEMA_PATH"
          npx prisma generate --schema=$SCHEMA_PATH

      - name: 5. Compilar Proyecto
        run: npm run build

      - name: 6. Empaquetar para cPanel
        run: |
          # Solo guardamos lo necesario para no saturar tu cPanel
          zip -r dist.zip dist package.json package-lock.json prisma
          echo "¡ZIP CREADO EXITOSAMENTE!"

      - name: 7. Subir Archivo Final
        uses: actions/upload-artifact@v4
        with:
          name: evolucion-api-listo
          path: dist.zip
